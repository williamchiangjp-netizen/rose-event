<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="YWPf8rNIfij6NAMHu_zmBnpeLLA2M7CykYO6c4vyasw" />
    <title>🌹 玫瑰守護神 - 唯覓文化情人節決選 | 官方投票入口</title>
    <meta name="description" content="2026 玫瑰守護神決選開跑！唯覓文化傳媒主辦，2/14-3/14 限時投票。立即點擊 bit.ly/tiktok-rose 進入線上直播應援。">
    <meta name="keywords" content="玫瑰守護神, 唯覓文化, 情人節活動, 玫瑰守護神決選, 線上直播, 2月14日, 3月14日">

    <style>
        :root { --primary: #ff3b5c; --secondary: #69c9d0; }
        body { margin: 0; background: #0a0a0a; color: #fff; font-family: 'PingFang TC', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        /* 玫瑰花瓣飄落動畫 */
        .petals { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .petal { position: absolute; background: #ff3b5c; opacity: 0.6; border-radius: 150% 0 150% 150%; animation: drift 10s infinite linear; }

        @keyframes drift {
            0% { transform: translateY(-10%) rotate(0deg); left: 10%; }
            100% { transform: translateY(110vh) rotate(360deg); left: 90%; }
        }

        .container { z-index: 1; width: 90%; max-width: 450px; margin-top: 40px; text-align: center; }
        
        /* 霓虹卡片 */
        .main-card { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(20px); border: 2px solid var(--primary); border-radius: 30px; padding: 40px 20px; box-shadow: 0 0 20px rgba(255, 59, 92, 0.3); animation: pulse 2s infinite alternate; }
        @keyframes pulse { from { box-shadow: 0 0 10px rgba(255, 59, 92, 0.2); } to { box-shadow: 0 0 25px rgba(255, 59, 92, 0.5); } }

        h1 { font-size: 36px; margin: 10px 0; background: linear-gradient(45deg, var(--primary), #ffb6c1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 5px rgba(255,59,92,0.5)); }
        
        .timer-box { background: rgba(255, 255, 255, 0.1); border-radius: 15px; padding: 15px; margin: 20px 0; border: 1px solid rgba(255,255,255,0.1); }
        #countdown { font-size: 22px; font-weight: bold; color: var(--secondary); letter-spacing: 1px; }

        .btn-link { display: block; background: linear-gradient(90deg, var(--primary), #ff2d78); color: white; text-decoration: none; padding: 20px; border-radius: 50px; font-size: 20px; font-weight: bold; margin: 30px 0; box-shadow: 0 10px 20px rgba(255, 59, 92, 0.4); transition: 0.3s; }
        .btn-link:hover { transform: translateY(-5px) scale(1.02); box-shadow: 0 15px 30px rgba(255, 59, 92, 0.6); }

        .info-tag { font-size: 14px; color: #888; margin-bottom: 5px; }
        .seo-text { max-width: 500px; margin-top: 50px; padding: 20px; font-size: 13px; color: #444; text-align: left; line-height: 1.8; }
        strong { color: #666; }
    </style>
</head>
<body>

    <div class="petals" id="petals"></div>

    <div class="container">
        <div class="main-card">
            <div style="font-size: 50px; margin-bottom: 10px;">🏆</div>
            <div class="info-tag">唯覓文化傳媒有限公司 | 2026 年度盛典</div>
            <h1>玫瑰守護神</h1>
            <div style="color: var(--secondary); font-weight: bold;">情人節限定活動 · 最終決選</div>
            
            <div class="timer-box">
                <div style="font-size: 14px; margin-bottom: 5px; color: #aaa;">距離活動結束還剩</div>
                <div id="countdown">載入計時中...</div>
            </div>

            <p style="font-size: 15px; color: #ddd;">進入線上直播間，為喜愛的選手應援！<br>每一朵玫瑰都是守護的力量。</p>
            
            <a href="https://webcast.tiktok.com/campaign/falcon/campaign/fusion_cosmic_runtime/pages/home/index.html?activityId=7605159099814349580&campaign_traffic_id=cptraffic010017sc1000000013424781316&enter_from=LINE&lang=zh-Hant-TW" class="btn-link">🚀 進入決選應援現場</a>
            
            <div style="font-size: 11px; color: #555;">活動 ID: 7605159099814349580</div>
        </div>

        <div class="seo-text">
            <strong>玫瑰守護神決選關鍵字：</strong> 唯覓文化傳媒有限公司主辦之情人節活動，自2月14日啟動，3月14日迎來最終決選。透過線上直播參與玫瑰守護神活動，見證最強人氣王誕生。
        </div>
    </div>

    <script>
        // 倒數計時功能 (目標日期：2026/03/14 23:59:59)
        function updateTimer() {
            const target = new Date('2026/03/14 23:59:59').getTime();
            const now = new Date().getTime();
            const diff = target - now;

            if (diff <= 0) {
                document.getElementById('countdown').innerHTML = "活動已圓滿結束";
                return;
            }

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('countdown').innerHTML = `${d}天 ${h}時 ${m}分 ${s}秒`;
        }
        setInterval(updateTimer, 1000);
        updateTimer();

        // 產生花瓣
        const petalContainer = document.getElementById('petals');
        for (let i = 0; i < 15; i++) {
            const petal = document.createElement('div');
            petal.className = 'petal';
            petal.style.width = Math.random() * 15 + 10 + 'px';
            petal.style.height = petal.style.width;
            petal.style.left = Math.random() * 100 + '%';
            petal.style.animationDelay = Math.random() * 10 + 's';
            petal.style.animationDuration = Math.random() * 5 + 7 + 's';
            petalContainer.appendChild(petal);
        }
    </script>
</body>
</html>
