        .main-card { background: rgba(15, 15, 15, 0.85); backdrop-filter: blur(20px); border: 1.5px solid rgba(255, 255, 255, 0.1); border-radius: 35px; padding: 45px 25px; box-shadow: 0 0 30px rgba(0,0,0,0.8); position: relative; overflow: hidden; }
        .main-card::before { content: ""; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px; background: linear-gradient(45deg, var(--tiktok-red), transparent, var(--tiktok-blue)); border-radius: 37px; z-index: -1; opacity: 0.4; }

        .btn-link { display: block; background: linear-gradient(90deg, var(--tiktok-red), #ff2d78); color: white; text-decoration: none; padding: 22px; border-radius: 50px; font-size: 22px; font-weight: 900; margin: 35px 0 15px 0; box-shadow: 0 10px 25px rgba(255, 59, 92, 0.5); transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .btn-link:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(255, 59, 92, 0.8); }

<body>

            <p style="font-size: 16px; color: #bbb;">進入線上直播間，投票支持選手！<br>每一朵玫瑰，都是守護的力量。</p>
            
            <a href="https://webcast.tiktok.com/campaign/falcon/campaign/fusion_cosmic_runtime/pages/home/index.html?activityId=7605159099814349580&campaign_traffic_id=cptraffic010017sc1000000013424781316&enter_from=LINE&lang=zh-Hant-TW" class="btn-link">🔥 前往直播決選現場</a>
            <div style="font-size: 10px; color: #444;">ID: 7605159099814349580</div>
        </div>

        <div class="seo-text">
            <strong>玫瑰守護神關鍵字：</strong> 唯覓文化傳媒有限公司主辦，2月14日至3月14日玫瑰守護神決選。透過 bit.ly/tiktok-rose 參與線上直播應援。
        </div>
    </div>

    <canvas id="fg-canvas"></canvas>

    <script>
        // 倒數計時
        function updateTimer() {
            const target = new Date('2026/03/14 23:59:59').getTime();
            const now = new Date().getTime();
            const diff = target - now;
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = String(Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60))).padStart(2, '0');
            const m = String(Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60))).padStart(2, '0');
            const s = String(Math.floor((diff % (1000 * 60)) / 1000)).padStart(2, '0');
            document.getElementById('countdown').innerHTML = diff > 0 ? `${d}天 ${h}:${m}:${s}` : "活動圓滿結束";
        }
        setInterval(updateTimer, 1000); updateTimer();

        // 3D 花瓣邏輯
        function createPetalSystem(canvasId, count, minSize, maxSize, speedMult) {
            const canvas = document.getElementById(canvasId);
            const ctx = canvas.getContext('2d');
            let width, height, petals = [];

            function init() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
                petals = Array.from({length: count}, () => new Petal());
            }

            class Petal {
                constructor() {
                    this.reset();
                    this.y = Math.random() * height; // 初始分佈
                }
                reset() {
                    this.x = Math.random() * width;
                    this.y = -20;
                    this.size = Math.random() * (maxSize - minSize) + minSize;
                    this.speedY = (Math.random() * 1.5 + 1) * speedMult;
                    this.speedX = Math.random() * 1 - 0.5;
                    this.flip = Math.random() * Math.PI;
                    this.flipSpeed = Math.random() * 0.03 + 0.01;
                    this.angle = Math.random() * 360;
                    this.spin = Math.random() * 2 - 1;
                }
                update() {
                    this.y += this.speedY;
                    this.x += this.speedX;
                    this.flip += this.flipSpeed;
                    this.angle += this.spin;
                    if (this.y > height + 20) this.reset();
                }
                draw() {
                    ctx.save();
                    ctx.translate(this.x, this.y);
                    ctx.rotate(this.angle * Math.PI / 180);
                    ctx.scale(1, Math.abs(Math.cos(this.flip)));
                    ctx.beginPath();
                    ctx.fillStyle = `hsl(${350 + Math.random()*10}, 80%, 50%)`;
                    ctx.moveTo(0, 0);
                    ctx.bezierCurveTo(this.size, -this.size, this.size, this.size, 0, this.size * 1.5);
                    ctx.bezierCurveTo(-this.size, this.size, -this.size, -this.size, 0, 0);
                    ctx.fill();
                    ctx.restore();
                }
            }

            function animate() {
                ctx.clearRect(0, 0, width, height);
                petals.forEach(p => { p.update(); p.draw(); });
                requestAnimationFrame(animate);
            }
            init(); animate();
            window.addEventListener('resize', init);
        }

        // 啟動背景組 (數量多, 較小, 較慢)
        createPetalSystem('bg-canvas', 25, 5, 10, 0.8);
        // 啟動前景組 (數量少, 較大, 較快, 會蓋在卡片上)
        createPetalSystem('fg-canvas', 8, 12, 20, 1.2);
    </script>
</body>
