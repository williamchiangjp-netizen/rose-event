    <script>
        function createPetalSystem(canvasId, count, minSize, maxSize, speedMult) {
            const canvas = document.getElementById(canvasId);
            const ctx = canvas.getContext('2d');
            let width, height, petals = [];
            function init() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
                petals = Array.from({length: count}, () => new Petal());
            }
            class Petal {
                constructor() { this.reset(); this.y = Math.random() * height; }
                reset() {
                    this.x = Math.random() * width; this.y = -20;
                    this.size = Math.random() * (maxSize - minSize) + minSize;
                    this.speedY = (Math.random() * 1.5 + 1.2) * speedMult; // 恢復輕快下落速度
                    this.speedX = Math.random() * 1.5 - 0.75;
                    this.flip = Math.random() * Math.PI;
                    this.flipSpeed = Math.random() * 0.04 + 0.02;
                    this.angle = Math.random() * 360;
                    this.spin = Math.random() * 3 - 1.5;
                }
                update() {
                    this.y += this.speedY; this.x += this.speedX;
                    this.flip += this.flipSpeed; this.angle += this.spin;
                    if (this.y > height + 20) this.reset();
                }
                draw() {
                    ctx.save(); ctx.translate(this.x, this.y);
                    ctx.rotate(this.angle * Math.PI / 180);
                    ctx.scale(1, Math.abs(Math.cos(this.flip)));
                    ctx.beginPath(); 
                    ctx.fillStyle = `hsl(${350 + Math.random()*10}, 85%, 55%)`; // 顏色調回鮮豔紅
                    ctx.moveTo(0, 0); ctx.bezierCurveTo(this.size, -this.size, this.size, this.size, 0, this.size * 1.5);
                    ctx.bezierCurveTo(-this.size, this.size, -this.size, -this.size, 0, 0);
                    ctx.fill(); ctx.restore();
                }
            }
            function animate() {
                ctx.clearRect(0, 0, width, height);
                petals.forEach(p => { p.update(); p.draw(); });
                requestAnimationFrame(animate);
            }
            init(); animate(); window.addEventListener('resize', init);
        }
        createPetalSystem('bg-canvas', 25, 5, 10, 0.9);
        createPetalSystem('fg-canvas', 8, 12, 22, 1.3);
