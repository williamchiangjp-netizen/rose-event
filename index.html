        .container { z-index: 10; width: 90%; max-width: 450px; margin-top: 50px; text-align: center; }
        
        /* TikTok 風格雙色霓虹卡片 */
        .main-card { background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(25px); border: 2px solid #222; border-radius: 30px; padding: 45px 25px; box-shadow: 0 0 15px rgba(255, 59, 92, 0.2), 0 0 15px rgba(105, 201, 208, 0.2); animation: neonPulse 3s infinite alternate; }
        @keyframes neonPulse { from { box-shadow: 0 0 10px rgba(255, 59, 92, 0.1), 0 0 10px rgba(105, 201, 208, 0.1); } to { box-shadow: 0 0 25px rgba(255, 59, 92, 0.3), 0 0 25px rgba(105, 201, 208, 0.3); } }

        h1 { font-size: 38px; margin: 10px 0; background: linear-gradient(45deg, var(--tiktok-red), #ffb6c1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 8px rgba(255,59,92,0.6)); font-weight: 900; }
        
        .timer-box { background: rgba(255, 255, 255, 0.05); border-radius: 20px; padding: 18px; margin: 25px 0; border: 1px solid rgba(255,255,255,0.05); }
        #countdown { font-size: 24px; font-weight: bold; color: var(--tiktok-blue); letter-spacing: 1.5px; text-shadow: 0 0 5px var(--tiktok-blue); }

        .btn-link { display: block; background: linear-gradient(90deg, var(--tiktok-red), #ff2d78); color: white; text-decoration: none; padding: 22px; border-radius: 50px; font-size: 22px; font-weight: 900; margin: 35px 0 15px 0; box-shadow: 0 10px 25px rgba(255, 59, 92, 0.5); transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .btn-link:hover { transform: translateY(-7px) scale(1.03); box-shadow: 0 20px 40px rgba(255, 59, 92, 0.7); }

        .info-tag { font-size: 13px; color: #777; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        .seo-text { max-width: 500px; margin-top: 60px; padding: 30px 20px; font-size: 13px; color: #444; text-align: left; line-height: 2; border-top: 1px solid #1a1a1a; }

</head>
<body>

    <canvas id="petal-canvas"></canvas>

    <div class="container">
        <div class="main-card">
            <div style="font-size: 55px; margin-bottom: 15px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.3));">🏆</div>

            <h1>玫瑰守護神</h1>
            <div style="color: var(--tiktok-blue); font-weight: bold; font-size: 18px; text-shadow: 0 0 5px rgba(105,201,208,0.3);">情人節限定活動 · 最終決選</div>
            
            <div class="timer-box">
                <div style="font-size: 14px; margin-bottom: 7px; color: #aaa;">距離應援結束還剩</div>
                <div id="countdown">載入計時中...</div>
            </div>

            <p style="font-size: 16px; color: #ddd; line-height: 1.7; margin: 25px 0;">進入線上直播間，投票支持您的選手！<br>每一朵玫瑰，都是最有力的守護。</p>
            
            <a href="https://webcast.tiktok.com/campaign/falcon/campaign/fusion_cosmic_runtime/pages/home/index.html?activityId=7605159099814349580&campaign_traffic_id=cptraffic010017sc1000000013424781316&enter_from=LINE&lang=zh-Hant-TW" class="btn-link">🔥 進入決選直播應援現場</a>
            
            <div style="font-size: 11px; color: #444; letter-spacing: 1px;">活動 ID: 7605159099814349580</div>
        </div>

        <div class="seo-text">
            <strong>唯覓文化玫瑰守護神決選關鍵字：</strong> 由唯覓文化傳媒有限公司主辦的情人節特別活動，自 2月14日 開放投票，至 3月14日 進行最終決選。粉絲可透過 bit.ly/tiktok-rose 進入線上直播間參與玫瑰守護神應援活動，助力喜愛的創作者登上年度人氣王寶座。
        </div>
    </div>

    <script>
        // 倒數計時 (目標日期：2026/03/14 23:59:59)
        function updateTimer() {
            const target = new Date('2026/03/14 23:59:59').getTime();
            const now = new Date().getTime();
            const diff = target - now;
            const display = document.getElementById('countdown');

            if (diff <= 0) {
                display.innerHTML = "活動已圓滿結束";
                display.style.color = "#777";
                return;
            }

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = String(Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60))).padStart(2, '0');
            const m = String(Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60))).padStart(2, '0');
            const s = String(Math.floor((diff % (1000 * 60)) / 1000)).padStart(2, '0');

            display.innerHTML = `${d}天 ${h}:${m}:${s}`;
        }
        setInterval(updateTimer, 1000);
        updateTimer();

        // 3D 花瓣系統
        const canvas = document.getElementById('petal-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, petals = [];
        const petalCount = 20;

        function initCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            petals = [];
            for (let i = 0; i < petalCount; i++) {
                petals.push(new Petal());
            }
        }

        class Petal {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height - height;
                this.size = Math.random() * 10 + 8; // 增加花瓣大小
                this.speedX = Math.random() * 2 - 1;
                this.speedY = Math.random() * 1.5 + 1; // 增加下落速度
                this.angle = Math.random() * 360;
                this.spinSpeed = Math.random() * 3 - 1.5;
                this.flipSpeed = Math.random() * 0.05 + 0.02;
                this.flip = 0;
                this.color = `hsl(${Math.random() * 10 + 350}, 100%, ${Math.random() * 20 + 50}%)`; // 更多樣的紅色
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.angle += this.spinSpeed;
                this.flip += this.flipSpeed;
                if (this.y > height) { // 重新回到頂部
                    this.y = -this.size;
                    this.x = Math.random() * width;
                }
            }
            draw() {
                ctx.save();
                ctx.translate(this.x + this.size / 2, this.y + this.size / 2);
                ctx.rotate(this.angle * Math.PI / 180);
                const scaleY = Math.abs(Math.cos(this.flip));
                ctx.scale(1, scaleY);
                ctx.beginPath();
                ctx.fillStyle = this.color;
                // 3D 花瓣形狀
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(this.size * 1.5, -this.size, this.size * 1.5, this.size, 0, this.size * 1.5);
                ctx.bezierCurveTo(-this.size * 1.5, this.size, -this.size * 1.5, -this.size, 0, 0);
                ctx.fill();
                // 加一點陰影強化立體感
                ctx.shadowColor = 'rgba(0,0,0,0.5)';
                ctx.shadowBlur = 5;
                ctx.restore();
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            petals.forEach(petal => {
                petal.update();
                petal.draw();
            });
            requestAnimationFrame(animate);
        }

        initCanvas();
        animate();
        window.addEventListener('resize', initCanvas);
    </script>
</body>
</html>
